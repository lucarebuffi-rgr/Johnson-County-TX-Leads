name: Scrape Johnson County TX Leads

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          python scraper/fetch.py

      - name: Show debug HTML
        run: |
          python -c "
          import asyncio
          from playwright.async_api import async_playwright
          async def debug():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page()
                  await page.goto('https://johnson.tx.publicsearch.us/results?department=RP&docTypes=LiPn&recordedDateRange=20260328,20260411&searchType=advancedSearch', timeout=30000)
                  await asyncio.sleep(5)
                  html = await page.content()
                  await browser.close()
                  # Print first 3000 chars
                  print(html[:3000])
          asyncio.run(debug())
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
